<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Entre Mundos — Dia 1</title>

<style>
body{
  margin:0;
  background:#0b2238;
  color:white;
  font-family:system-ui;
}
.wrap{max-width:700px;margin:auto;padding:20px}
nav{display:flex;gap:10px;margin-bottom:20px}
.chip{padding:10px;background:#1a3a5a;border-radius:12px;cursor:pointer}
.chip.active{background:#214f85}
.card{background:#112c4a;padding:20px;border-radius:16px;margin-top:10px}
button{padding:10px;border-radius:10px;border:0;background:#214f85;color:white;margin-right:10px}
</style>
</head>

<body>
<div class="wrap">

<h1>Entre Mundos</h1>

<nav>
<div class="chip" data-tab="tabOraculo">Oráculo</div>
<div class="chip" data-tab="tabResp">Respiração</div>
<div class="chip" data-tab="tabFrase">Frase</div>
</nav>

<section id="tabOraculo" class="card">
<h2>Oráculo</h2>
<div id="oracleMsg">Clica em "Nova mensagem"</div>
<br>
<button id="btnNova">Nova mensagem</button>
<button id="btnCopiar">Copiar</button>
<button id="btnWhats">WhatsApp</button>
</section>

<section id="tabResp" class="card" style="display:none">
Respira 4-4-6
</section>

<section id="tabFrase" class="card" style="display:none">
Mesmo no escuro, a tua luz interior sabe o caminho.
</section>

</div>

<script>
const mensagens = [
"A tua alma já sabe o caminho.",
"Confia no que sentes.",
"Nem tudo precisa de resposta hoje.",
"Respira. Estás onde precisas estar.",
"O que procuras já está dentro de ti."
];

const el = document.getElementById("oracleMsg");

document.getElementById("btnNova").onclick = () => {
  const i = Math.floor(Math.random()*mensagens.length);
  el.textContent = mensagens[i];
};

document.getElementById("btnCopiar").onclick = () => {
  navigator.clipboard.writeText(el.textContent);
};

document.getElementById("btnWhats").onclick = () => {
  const t = encodeURIComponent(el.textContent);
  window.open(`https://wa.me/?text=${t}`);
};

document.querySelectorAll(".chip").forEach(c=>{
  c.onclick=()=>{
    document.querySelectorAll(".card").forEach(s=>s.style.display="none");
    document.getElementById(c.dataset.tab).style.display="block";
    document.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));
    c.classList.add("active");
  };
});

document.querySelector('.chip[data-tab="tabOraculo"]').click();
</script>

</body>
</html>
