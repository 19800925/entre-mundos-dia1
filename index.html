<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050814" />
  <meta name="description" content="Entre Mundos" />
  <title>Entre Mundos</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <section class="screen active" id="mensagem" aria-label="Mensagem">
      <div class="screen-bg bg-home"></div>
      <div class="nav-taps">
        <button data-tab="mensagem" aria-label="Mensagem"></button>
        <button data-tab="respiracao" aria-label="Respiração"></button>
        <button data-tab="oraculo" aria-label="Oráculo"></button>
        <button data-tab="silencio" aria-label="Silêncio"></button>
      </div>
    </section>

    <section class="screen" id="respiracao" aria-label="Respiração">
      <div class="screen-bg bg-respiracao"></div>
      <div class="nav-taps">
        <button data-tab="mensagem" aria-label="Mensagem"></button>
        <button data-tab="respiracao" aria-label="Respiração"></button>
        <button data-tab="oraculo" aria-label="Oráculo"></button>
        <button data-tab="silencio" aria-label="Silêncio"></button>
      </div>
    </section>

    <section class="screen" id="oraculo" aria-label="Oráculo">
      <div class="screen-bg bg-oraculo"></div>
      <div class="nav-taps">
        <button data-tab="mensagem" aria-label="Mensagem"></button>
        <button data-tab="respiracao" aria-label="Respiração"></button>
        <button data-tab="oraculo" aria-label="Oráculo"></button>
        <button data-tab="silencio" aria-label="Silêncio"></button>
      </div>
    </section>

    <section class="screen" id="silencio" aria-label="Silêncio">
      <div class="screen-bg bg-silencio"></div>
      <div class="nav-taps">
        <button data-tab="mensagem" aria-label="Mensagem"></button>
        <button data-tab="respiracao" aria-label="Respiração"></button>
        <button data-tab="oraculo" aria-label="Oráculo"></button>
        <button data-tab="silencio" aria-label="Silêncio"></button>
      </div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
